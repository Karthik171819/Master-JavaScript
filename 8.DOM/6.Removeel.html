<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id = "deleteMe">
        <p>This is a paragraph to be deleted.</p>
    </div>

    <button onClick = "removeElement()">Click to Delete</button>
    <script>
        function removeElement(){
            const element = document.getElementById('deleteMe');
            element.remove();
        }
    </script>
</body>
</html>
