<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id = "AttributeDiv" data = "This is attribute data"></div>
    <script>
        const element = document.getElementById('AttributeDiv');
        const el = element.getAttribute('data');
        element.textContent = el;
        console.log(el);
        //to setAttribute access them by id and use setAttribute method first value name and second value is the value you want to set
        //example element.setAttribute('data', 'New attribute data');
    </script>
</body>
</html>
