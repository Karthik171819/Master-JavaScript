<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz App</title>
    <style>
        #quiz-container {
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
            border: 2px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            font-family: sans-serif;
        }
        .btn{
            display: block;
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <h2 id="quiz-container">Question Text</h2>
        <div id="answers"></div>
        <button>Next</button>
    </div>
</body>
</html>
