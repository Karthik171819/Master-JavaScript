<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="textInput">Enter your text:</label>
    <input type="text" id="textInput">
    <script>
        const keydown = document.getElementById('textInput')
        keydown.addEventListener('keydown', function(){
            console.log('Key down event triggered', event.key);
        })

        keydown.addEventListener('keyup', function(){
            console.log('Key up event triggered', event.key);
        })
    </script>
</body>
</html>
