<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- direct alert function calling -->
    <button onclick="alert('Clicked!!')">Click Me!</button>

    <!-- formal way to call -->
     <button onclick="showAlert()">Click Through Function</button>
     <script>
        function showAlert(){
            alert('Clicked through JS Function')
        }
     </script>
</body>
</html>
