<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- direct alert function calling -->
    <button onclick="alert('Clicked!!')">Click Me!</button>

    <!-- formal way to call -->
     <button onclick="showAlert()">Click Through Function</button>

     <!-- By DOM Method -->
      <button id="btn">Button DOM</button>
     <script>
        function showAlert(){
            alert('Clicked through JS Function')
        }
        // DOM Method
        const btnEL = document.getElementById('btn');
        btnEL.addEventListener('click', function(event){
            alert('Clicked through DOM Method ' +event.type)
        })
     </script>
</body>
</html>
