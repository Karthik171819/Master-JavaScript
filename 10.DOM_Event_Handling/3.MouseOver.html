<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="mouseOver">Hover over me!</div>
    <script>
      const mouseover = document.getElementById("mouseOver");
      mouseover.addEventListener("mouseover", function () {
        mouseover.textContent = "Mouse is over me!!";
      });
      mouseover.addEventListener("mouseout", function () {
        mouseover.textContent = "Hover over me!";
      });
    </script>
  </body>
</html>
