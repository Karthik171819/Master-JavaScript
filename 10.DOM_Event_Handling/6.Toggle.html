<!-- Toggle theme by classList manipulation -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle theme</title>
    <style>
        .light-theme {
            background-color: white;
            color: black;
        }
        .dark-theme {
            background-color: rgb(113, 214, 248);
            color: white;
        }
    </style>
</head>
<body>
    <h2>Toggle Theme Example</h2>
    <button id = "toggleBtn">Toggle Theme</button>
    <script>
       const btn = document.getElementById('toggleBtn');
       document.body.classList.add('light-theme'); // Set initial theme
       btn.addEventListener('click', function(e) {
           document.body.classList.toggle('light-theme'); // Toggle light theme
           document.body.classList.toggle('dark-theme'); // Toggle dark theme
           if(e.target && e.target.nodeName === 'BUTTON') {
            //console.log('Clicked on:', e.target.textContent);
           }
           const h2 = document.querySelector('h2');
           h2.textContent = "Toggle Themed Successfully"
       });
    </script>
</body>
</html>
